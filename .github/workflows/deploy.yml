name: CI/CD — Deploy CRM SaaS

on:
  push:
    branches:
      - main
      - develop

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: TypeScript type check
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc -b --noEmit
        name: Type check

  # ──────────────────────────────────────────────
  # JOB 2: Run DB migrations on push to main (Production)
  # ──────────────────────────────────────────────
  migrate-production:
    name: Apply Migrations → Production
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link to Production
        run: supabase link --project-ref ikofyypxphrqkncimszt
      - name: Push migrations to Production
        run: supabase db push

  # ──────────────────────────────────────────────
  # JOB 3: Run DB migrations on push to develop (Staging)
  # ──────────────────────────────────────────────
  migrate-develop:
    name: Apply Migrations → Develop
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/develop'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_DEV }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link to Develop
        run: supabase link --project-ref mtxqqamitglhehaktgxm
      - name: Push migrations to Develop
        run: supabase db push
